name: Render Keep Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$RENDER_HEALTHCHECK_URL" ]; then
            echo "RENDER_HEALTHCHECK_URL secret is not set"
            exit 1
          fi

          curl --fail --show-error --silent \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 5 \
            --max-time 20 \
            "$RENDER_HEALTHCHECK_URL"
